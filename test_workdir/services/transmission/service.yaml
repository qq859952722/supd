name: transmission
version: "4.1.3"
description: "Transmission BitTorrent 客户端 (静态编译版)"
icon: download
autostart: false
command:
  - ./bin/transmission-daemon
  - -g
  - ./data/transmission-daemon
  - -f
tags:
  - download
  - media
  - bittorrent
readiness:
  type: tcp_check
  port: 9091
  interval_seconds: 1
  timeout_seconds: 10
# restart: never 演示（崩溃后不自动重启，由用户决定）
# 规格 §2.1.3: never 任何情况都不重启
restart:
  policy: never
# package: 打包规则演示（规格 §2.12.2）
# 导出时默认包含 extensions/，显式排除运行时数据和临时文件
package:
  include:
    - service.yaml
    - extensions/
  exclude:
    - data/
    - "*.tmp"
    - "*.log"
  default: include
stop:
  grace_seconds: 10
  timeout_seconds: 60
logging:
  enabled: true
  max_size_mb: 10
  max_files: 5
