# transmission-tracker-updater 环境变量配置
# 规格 §2.2.4: env.yaml 定义扩展私有环境变量
# 变量名含 PASSWORD/PWD/SECRET/TOKEN/KEY 时前端用 password 渲染
env:
  TRANSMISSION_RPC_HOST:
    value: "127.0.0.1"
    hint: "Transmission RPC 主机地址"
  TRANSMISSION_RPC_PORT:
    value: "9091"
    hint: "Transmission RPC 端口"
  TRANSMISSION_RPC_USER:
    value: ""
    hint: "RPC 用户名（未启用鉴权时留空）"
  TRANSMISSION_RPC_PASS:
    value: ""
    hint: "RPC 密码（未启用鉴权时留空，前端以 password 框渲染）"
  TRANSMISSION_TRACKER_URL:
    value: "https://raw.githubusercontent.com/adysec/tracker/main/trackers_best.txt"
    hint: "Tracker 列表源 URL（主源）"
