name: fd-notify-demo
version: "1.0.0"
description: "fd_notify readiness 演示（bash 通过 fd 3 通知就绪）"
icon: bell
autostart: true
command:
  - bash
  - run.sh
tags:
  - test
  - fd_notify
readiness:
  type: fd_notify
  fd: 3
  timeout_seconds: 10
stop:
  grace_seconds: 5
  timeout_seconds: 30
logging:
  enabled: true
  max_size_mb: 5
  max_files: 3
