name: signals-demo
version: "1.0.0"
description: "信号处理演示服务（响应 HUP/USR1/USR2/TERM）"
icon: zap
autostart: false
command:
  - bash
  - run.sh
tags:
  - test
  - signals
readiness:
  type: fd_notify
  fd: 3
  timeout_seconds: 10
# restart: on-failure 演示（仅崩溃重启，正常停止不重启）
# 规格 §2.1.3: on-failure 仅在退出码非 0 时重启
restart:
  policy: on-failure
  max_retries: 3
  backoff_ms: 1000
  max_backoff_ms: 10000
  multiplier: 2
  reset_after_seconds: 60
# signals: 自定义信号映射（规格 §2.3.2）
# run.sh 已 trap HUP/USR1/USR2/TERM/INT，此处映射为语义化按钮
signals:
  reload: HUP
  rotate_logs: USR1
  graceful_quit: QUIT
stop:
  grace_seconds: 5
  timeout_seconds: 30
logging:
  enabled: true
  max_size_mb: 5
  max_files: 3
