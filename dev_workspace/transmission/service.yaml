name: transmission
version: "1.0.0"
description: "Transmission BitTorrent 客户端（静态编译 4.1.3 + trwm WebUI）"
icon: download
autostart: false
user: nobody
tags: ["download", "bittorrent", "webui"]
command:
  - ./transmission-daemon
  - -f
  - -g
  - config
readiness:
  type: tcp_check
  port: 9091
  interval_seconds: 2
  timeout_seconds: 30
stop:
  grace_seconds: 15
  timeout_seconds: 60
logging:
  enabled: true
  max_size_mb: 10
  max_files: 3
