name: qbittorrent-updater
version: "1.0.0"
description: "qBittorrent 二进制更新管理：检查 GitHub 最新版本、下载并安装静态二进制"
runtime: tjs
entry: run.js
timeout_seconds: 300
enabled: true

concurrency: serialize

ui:
  show_logs: true
  button_style: primary
  icon: refresh

# 三个 action：仅检查 / 仅安装（用默认版本，run.js 回退到 CURRENT_TAG） / 检查并安装最新版
# 注意：supd 的 actions[].args 暂不支持对象格式（id/label/type/default），仅支持简单字符串列表
actions:
  - id: check-update
    label: 检查更新
    button_style: default
  - id: install
    label: 安装指定版本
    button_style: primary
  - id: install-latest
    label: 检查并安装最新版
    button_style: primary

triggers:
  on_demand: true
