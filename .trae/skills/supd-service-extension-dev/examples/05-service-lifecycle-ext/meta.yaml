# 示例：服务生命周期扩展（service_lifecycle）
# 将目录名与 name 字段改为你的扩展名称（格式：^[a-z][a-z0-9-]*$）
name: service-lifecycle-ext
version: "1.0.0"
description: "服务生命周期钩子扩展，响应服务的 post_ready/on_failure/pre_stop 三种事件"
enabled: true
runtime: bash
entry: ./run.sh
timeout_seconds: 10
ui:
  show_logs: true
  button_style: default
triggers:
  service_lifecycle:
    - event: post_ready
      action: on-ready
    - event: on_failure
      action: on-fail
    - event: pre_stop
      action: on-stop
actions:
  - id: on-ready
    label: "就绪钩子"
  - id: on-fail
    label: "失败钩子"
  - id: on-stop
    label: "停止钩子"
