# 示例：定时+手动混合扩展（on_schedule + on_demand）
# 将目录名与 name 字段改为你的扩展名称（格式：^[a-z][a-z0-9-]*$）
name: stats-report-ext
version: "1.0.0"
description: "定时生成服务状态统计报告，支持手动触发，完整示范 stdout 协议与 ::progress::/::result:: 用法"
enabled: true
runtime: bash
entry: ./run.sh
timeout_seconds: 90
concurrency: replace
triggers:
  on_demand: true
  on_schedule:
    - cron: "*/30 * * * *"
      action: report
actions:
  - id: report
    label: 生成报告
    button_style: primary
